name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build --workspace=packages/runtime

      - run: npm run test --workspace=packages/runtime

      - name: Check version bump
        run: |
          BASE_VERSION=$(git show origin/main:packages/runtime/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          CURRENT_VERSION=$(node -p "require('./packages/runtime/package.json').version")
          if [ "$BASE_VERSION" = "$CURRENT_VERSION" ]; then
            echo "⚠️  Version not bumped. Please run: npm version patch -w packages/runtime"
            exit 1
          fi
          echo "✅ Version bumped: $BASE_VERSION → $CURRENT_VERSION"
